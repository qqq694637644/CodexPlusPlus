name: LocalGPT platform smoke

on:
  pull_request:
    paths:
      - ".github/workflows/localgpt-platform.yml"
      - "requirements.txt"
      - "localgpt_platform/**"
      - "scripts/localgpt_platform_smoke.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/localgpt-platform.yml"
      - "requirements.txt"
      - "localgpt_platform/**"
      - "scripts/localgpt_platform_smoke.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  localgpt-platform:
    name: localgpt platform smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall -q localgpt_platform

      - name: Check operation describe CLI
        run: |
          python -m localgpt_platform.cli operations --category artifact --detail brief
          python -m localgpt_platform.cli operations --operation ci.prepare_failure_context --detail full

      - name: Import MCP server
        run: python -c "import localgpt_platform.mcp_server"

      - name: Run LocalGPT platform smoke tests
        run: python scripts/localgpt_platform_smoke.py
