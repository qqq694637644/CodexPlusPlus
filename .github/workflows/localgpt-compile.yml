name: LocalGPT compile

on:
  pull_request:
    paths:
      - ".github/workflows/localgpt-compile.yml"
      - "requirements.txt"
      - "localgpt_platform/**"
      - "templates/skills/**"
      - "scripts/localgpt_platform_smoke.py"
      - "scripts/ci_windows_target_cache.py"
      - "localgpt/**"
      - "build/CodexPlusPlus-localgpt/Cargo.toml"
      - "build/CodexPlusPlus-localgpt/Cargo.lock"
      - "build/CodexPlusPlus-localgpt/crates/codex-plus-core/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/localgpt-compile.yml"
      - "requirements.txt"
      - "localgpt_platform/**"
      - "templates/skills/**"
      - "scripts/localgpt_platform_smoke.py"
      - "scripts/ci_windows_target_cache.py"
      - "localgpt/**"
      - "build/CodexPlusPlus-localgpt/Cargo.toml"
      - "build/CodexPlusPlus-localgpt/Cargo.lock"
      - "build/CodexPlusPlus-localgpt/crates/codex-plus-core/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  localgpt-platform:
    name: localgpt platform smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall -q localgpt_platform

      - name: Check operation describe CLI
        run: |
          python -m localgpt_platform.cli operations --category artifact --detail brief
          python -m localgpt_platform.cli operations --operation ci.prepare_failure_context --detail full

      - name: Import MCP server
        run: python -c "import localgpt_platform.mcp_server"

      - name: Run LocalGPT platform smoke tests
        run: python scripts/localgpt_platform_smoke.py

  localgpt-crate:
    name: localgpt crate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check localgpt crate
        run: cargo check --manifest-path localgpt/Cargo.toml --all-targets

  codex-plus-core-integration:
    name: codex-plus-core integration
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check codex-plus-core with LocalGPT path dependency
        run: cargo check --manifest-path build/CodexPlusPlus-localgpt/Cargo.toml -p codex-plus-core --all-targets

  windows-artifacts:
    name: Windows artifacts
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: build/CodexPlusPlus-localgpt/apps/codex-plus-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache frontend third-party dependencies
        uses: actions/cache@v4
        with:
          path: build/CodexPlusPlus-localgpt/apps/codex-plus-manager/node_modules
          key: ${{ runner.os }}-node-22-codex-manager-node-modules-${{ hashFiles('build/CodexPlusPlus-localgpt/apps/codex-plus-manager/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-codex-manager-node-modules-

      - name: Cache Cargo third-party dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/registry/src
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('build/CodexPlusPlus-localgpt/Cargo.lock', 'localgpt/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deps-

      - name: Restore Rust release build intermediates
        id: restore-rust-target-cache
        uses: actions/cache/restore@v4
        with:
          path: build/CodexPlusPlus-localgpt/target
          key: ${{ runner.os }}-cargo-target-release-${{ hashFiles('build/CodexPlusPlus-localgpt/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-release-${{ hashFiles('build/CodexPlusPlus-localgpt/Cargo.lock') }}-

      - name: Install frontend dependencies
        working-directory: build/CodexPlusPlus-localgpt/apps/codex-plus-manager
        run: npm install --package-lock=false --prefer-offline --no-audit

      - name: Build frontend
        working-directory: build/CodexPlusPlus-localgpt/apps/codex-plus-manager
        run: npm run vite:build

      - name: Build release binaries
        working-directory: build/CodexPlusPlus-localgpt
        env:
          CARGO_INCREMENTAL: "1"
        run: cargo build --release

      - name: Save Rust release build intermediates
        if: ${{ success() && steps.restore-rust-target-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: build/CodexPlusPlus-localgpt/target
          key: ${{ runner.os }}-cargo-target-release-${{ hashFiles('build/CodexPlusPlus-localgpt/Cargo.lock') }}-${{ github.sha }}

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: codex-plus-plus-localgpt-windows-binaries
          path: |
            build/CodexPlusPlus-localgpt/target/release/codex-plus-plus.exe
            build/CodexPlusPlus-localgpt/target/release/codex-plus-plus-manager.exe
          if-no-files-found: error
