name: LocalGPT crate

on:
  pull_request:
    paths:
      - ".github/workflows/localgpt-crate.yml"
      - "localgpt/**"
      - "templates/AGENTS.md"
      - "templates/skills/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/localgpt-crate.yml"
      - "localgpt/**"
      - "templates/AGENTS.md"
      - "templates/skills/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  localgpt-crate:
    name: localgpt crate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check localgpt crate
        run: cargo check --manifest-path localgpt/Cargo.toml --all-targets
